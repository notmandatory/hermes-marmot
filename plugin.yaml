name: marmot-platform
label: Marmot
kind: platform
version: 2.0.0
description: >
  Marmot Protocol gateway adapter for Hermes Agent.
  End-to-end encrypted Nostr messaging via MLS (RFC 9420).
  Uses mdk-python — no external daemon required.
author: Hermes
pip_dependencies:
  - mdk-python
  - websockets
  - nostr-sdk
requires_env: []
optional_env:
  - name: MARMOT_RELAYS
    description: "Comma-separated Nostr relay URLs (default: nos.lol, damus.io, primal.net)"
    prompt: "Relay URLs"
    password: false
  - name: MARMOT_ALLOWED_USERS
    description: "Comma-separated npubs allowed to DM the agent"
    prompt: "Allowed npubs (comma-separated)"
    password: false
  - name: MARMOT_ALLOW_ALL_USERS
    description: "Allow anyone to DM the agent (dev only)"
    prompt: "Allow all users?"
    password: false
  - name: MARMOT_HOME_CHANNEL
    description: "Default chat for cron / notification delivery (group hex)"
    prompt: "Home channel group hex"
    password: false
